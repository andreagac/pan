<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo redondeado marrón cálido -->
  <rect width="32" height="32" rx="6" fill="#7A3B1E"/>

  <!-- Pan/marraqueta: forma ovalada principal -->
  <ellipse cx="16" cy="18" rx="11" ry="7" fill="#D4993F"/>

  <!-- Línea central del pan (característica de la marraqueta) -->
  <line x1="5.5" y1="18" x2="26.5" y2="18" stroke="#C07830" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Brillo superior del pan -->
  <ellipse cx="16" cy="14" rx="7" ry="3.5" fill="#E8B45A" opacity="0.7"/>

  <!-- Pequeño corte en la corteza (textura artesanal) -->
  <path d="M11 14.5 Q16 12.5 21 14.5" stroke="#C07830" stroke-width="0.8" stroke-linecap="round" fill="none"/>
</svg>
